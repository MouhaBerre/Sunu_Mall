<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérifiez votre email - SUNU MALL</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; background-color: #ffffff;">
        <h1 style="color: #333333;">Bonjour {{ user.first_name }} !</h1>
        <p style="color: #555555; line-height: 1.5;">
            Merci de vous être inscrit sur SUNU MALL.
        </p>
        <p style="color: #555555; line-height: 1.5;">
            Pour activer votre compte, veuillez cliquer sur le bouton ci-dessous :
        </p>
        <div style="text-align: center; margin: 30px 0;">
            <a href="{{ verification_url }}" style="display: inline-block; padding: 12px 24px; background-color: #4CAF50; color: #ffffff; text-decoration: none; border-radius: 4px;">
                Vérifier mon email
            </a>
        </div>
        <p style="color: #555555; line-height: 1.5;">
            Si vous n'avez pas créé de compte, vous pouvez ignorer cet email.
        </p>
        <p style="color: #555555; line-height: 1.5;">
            Cordialement,<br>
            L'équipe SUNU MALL
        </p>
    </div>
</body>
</html>
