# Reverse proxy local : route les requêtes vers le bon service
# selon le sous-domaine ou le chemin. À adapter une fois les vrais
# noms de domaine définis (ex: sunumall.sn, vendeur.sunumall.sn).

server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /seller/ {
        proxy_pass http://seller-dashboard:80/;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
    }
}
