# =========================================================
# SUNU MALL — Orchestration locale de tous les services.
# Lancer depuis la racine du repo : docker compose -f infra/docker-compose.yml up
#
# Astuce : ajoute un alias dans ton shell, ex:
#   alias sunu="docker compose -f infra/docker-compose.yml"
# puis "sunu up", "sunu logs backend", etc.
# =========================================================
version: "3.9"

services:
  # ---------- Backend Django ----------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/dev.txt
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [sunu-mall]

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/dev.txt
    command: celery -A config worker -l info
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    depends_on:
      - backend
      - redis
    networks: [sunu-mall]

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/dev.txt
    command: celery -A config beat -l info
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    depends_on:
      - backend
      - redis
    networks: [sunu-mall]

  # ---------- Frontend boutique (Next.js) ----------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    networks: [sunu-mall]

  # ---------- Dashboard vendeur ----------
  seller-dashboard:
    build:
      context: ../seller-dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks: [sunu-mall]

  # ---------- Données ----------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sunu_mall}
      POSTGRES_USER: ${POSTGRES_USER:-sunu_mall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sunu_mall}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sunu_mall}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [sunu-mall]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [sunu-mall]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Console web MinIO
    networks: [sunu-mall]

  # ---------- Monitoring ----------
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [sunu-mall]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    ports:
      - "3030:3000"
    depends_on:
      - prometheus
    networks: [sunu-mall]

  # ---------- Reverse proxy ----------
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
      - seller-dashboard
    networks: [sunu-mall]

networks:
  sunu-mall:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
