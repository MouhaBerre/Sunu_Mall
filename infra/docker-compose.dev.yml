# =========================================================
# SUNU MALL — Orchestration DEV de tous les services.
# Lancer depuis la racine du repo : docker compose -f infra/docker-compose.dev.yml up
# =========================================================
version: "3.9"

services:
  # ---------- Backend Django ----------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/dev.txt
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - ../backend:/app
      - ./volumes/media:/app/media
    ports:
      - "8080:8000"
    env_file:
      - ./env/backend.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [sunu-mall]

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/dev.txt
    command: celery -A config worker -l info
    volumes:
      - ../backend:/app
    env_file:
      - ./env/backend.env
    depends_on:
      - backend
      - redis
    networks: [sunu-mall]

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/dev.txt
    command: celery -A config beat -l info
    volumes:
      - ../backend:/app
    env_file:
      - ./env/backend.env
    depends_on:
      - backend
      - redis
    networks: [sunu-mall]

  # ---------- Frontend boutique (Next.js) ----------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    networks: [sunu-mall]

  # ---------- Dashboard vendeur ----------
  seller-dashboard:
    build:
      context: ../seller-dashboard
      dockerfile: Dockerfile
    ports:
      - "3011:80"
    depends_on:
      - backend
    networks: [sunu-mall]

  # ---------- Données ----------
  db:
    image: postgres:16-alpine
    env_file:
      - ./env/postgres.env
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [sunu-mall]

  redis:
    image: redis:7-alpine
    env_file:
      - ./env/redis.env
    volumes:
      - ./volumes/redis:/data
    ports:
      - "6380:6379"
    networks: [sunu-mall]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./volumes/media:/data
    ports:
      - "9010:9000" # API S3
      - "9011:9001" # Console web MinIO
    networks: [sunu-mall]

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@sunumall.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - ./volumes/pgadmin:/var/lib/pgadmin
    ports:
      - "5051:80"
    depends_on:
      - db
    networks: [sunu-mall]

  # ---------- Monitoring ----------
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - ./volumes/prometheus:/prometheus
    ports:
      - "9091:9090"
    networks: [sunu-mall]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./volumes/grafana:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    ports:
      - "3031:3000"
    depends_on:
      - prometheus
    networks: [sunu-mall]

  # ---------- Reverse proxy ----------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    depends_on:
      - backend
      - frontend
      - seller-dashboard
    networks: [sunu-mall]

networks:
  sunu-mall:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
